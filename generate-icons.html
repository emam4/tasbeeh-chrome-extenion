<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Generate Icons</title>
    <style>
        body { font-family: sans-serif; padding: 30px; background: #f0f0f0; }
        h2 { margin-bottom: 20px; }
        .previews { display: flex; gap: 24px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 30px; }
        .preview { text-align: center; }
        .preview span { display: block; font-size: 12px; color: #666; margin-top: 6px; }
        canvas { border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); display: block; }
        button {
            padding: 12px 28px; background: #2e7d52; color: #fff;
            border: none; border-radius: 8px; font-size: 15px; cursor: pointer;
        }
        button:hover { background: #1b5e3a; }
        p { color: #555; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h2>Tasbeeh Icon Generator</h2>
    <p>Preview below. Click the button to download all sizes — then replace the existing PNG files in the extension folder.</p>

    <div class="previews" id="previews"></div>

    <button onclick="downloadAll()">⬇ Download all sizes (16, 32, 48, 128px)</button>

    <script>
        const SVG_URL = 'icon.svg';
        const SIZES = [16, 32, 48, 128];

        function renderToCanvas(svgUrl, size) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = size;
                    canvas.height = size;
                    canvas.getContext('2d').drawImage(img, 0, 0, size, size);
                    resolve(canvas);
                };
                img.src = svgUrl;
            });
        }

        async function init() {
            const container = document.getElementById('previews');
            for (const size of SIZES) {
                const canvas = await renderToCanvas(SVG_URL, size);
                const wrap = document.createElement('div');
                wrap.className = 'preview';
                const label = document.createElement('span');
                label.textContent = `${size}×${size}`;
                wrap.appendChild(canvas);
                wrap.appendChild(label);
                container.appendChild(wrap);
            }
        }

        async function downloadAll() {
            const names = { 16: 'icon16.png', 32: 'icon32.png', 48: 'icon48.png', 128: 'icon128.png' };
            for (const size of SIZES) {
                const canvas = await renderToCanvas(SVG_URL, size);
                const a = document.createElement('a');
                a.download = names[size];
                a.href = canvas.toDataURL('image/png');
                a.click();
            }
        }

        init();
    </script>
</body>
</html>
